<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Library Ops{% endblock %}</title>
  <style>
    :root {
      --bg: #f3efe7;
      --panel: #fffaf3;
      --panel-strong: #fffdf9;
      --ink: #1f1a17;
      --muted: #6f6256;
      --accent: #9b432e;
      --accent-strong: #7d2f1d;
      --accent-soft: #f2d9c4;
      --line: #d7cab7;
      --line-strong: #c9b298;
      --display-font: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Palatino, Georgia, serif;
      --body-font: "Aptos", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    }
    body {
      margin: 0;
      font-family: var(--body-font);
      line-height: 1.6;
      background:
        radial-gradient(circle at top left, #fbe2c6 0, transparent 32%),
        radial-gradient(circle at bottom right, #f7dec2 0, transparent 26%),
        linear-gradient(180deg, #f8f4ef 0%, var(--bg) 100%);
      color: var(--ink);
    }
    a {
      color: var(--accent-strong);
      text-decoration-thickness: 0.08em;
      text-underline-offset: 0.18em;
    }
    header, main {
      max-width: 1080px;
      margin: 0 auto;
      padding: 1rem 1.5rem;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
      padding-top: 1.25rem;
    }
    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 0.85rem;
      align-items: center;
    }
    .panel {
      background: linear-gradient(180deg, var(--panel-strong) 0%, var(--panel) 100%);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 1.3rem 1.35rem;
      box-shadow: 0 18px 40px rgba(80, 49, 29, 0.08);
      margin-bottom: 1.1rem;
    }
    .nav-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.65rem;
      align-items: center;
      justify-content: flex-end;
    }
    .button, button {
      display: inline-block;
      border: 0;
      border-radius: 999px;
      background: var(--accent);
      color: white;
      padding: 0.75rem 1.1rem;
      text-decoration: none;
      cursor: pointer;
      font: 600 0.98rem/1 var(--body-font);
      letter-spacing: 0.01em;
    }
    .button--ghost {
      background: transparent;
      color: var(--accent-strong);
      border: 1px solid var(--line-strong);
    }
    .eyebrow {
      color: var(--muted);
      font-size: 0.82rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }
    h1, h2, h3 {
      font-family: var(--display-font);
      line-height: 1.08;
      letter-spacing: -0.02em;
    }
    h1 {
      font-size: clamp(2.2rem, 4vw, 3.35rem);
    }
    h2 {
      font-size: clamp(1.5rem, 2.5vw, 2.2rem);
    }
    form p {
      display: grid;
      gap: 0.35rem;
    }
    label {
      font-weight: 600;
    }
    input, select, textarea {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 0.65rem 0.75rem;
      font: inherit;
      background: white;
    }
    .error,
    .errorlist {
      color: #8a2416;
    }
    .errorlist {
      margin: 0;
      padding-left: 1.1rem;
    }
    ul.clean {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 0.9rem;
    }
    .muted { color: var(--muted); }
    .grid {
      display: grid;
      gap: 1rem;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    }
    .dashboard-grid {
      align-items: start;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    .dashboard-grid--full {
      grid-column: 1 / -1;
    }
    .dashboard-panel-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.9rem;
      margin-bottom: 0.85rem;
    }
    .dashboard-panel-head h2 {
      margin: 0;
    }
    .dashboard-panel-head p {
      margin: 0.35rem 0 0;
      max-width: 42ch;
    }
    .dashboard-table-wrap {
      overflow-x: auto;
      margin-inline: -0.15rem;
      padding-inline: 0.15rem;
    }
    .dashboard-table {
      min-width: 100%;
    }
    .dashboard-copy {
      display: grid;
      gap: 0.12rem;
    }
    .dashboard-copy-title {
      font-weight: 700;
      color: var(--ink);
    }
    .dashboard-copy-subtitle {
      color: var(--muted);
      font-size: 0.92rem;
    }
    .dashboard-datetime {
      white-space: nowrap;
    }
    .lede {
      font-size: 1.08rem;
      max-width: 70ch;
    }
    .metric-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1rem;
    }
    .metric-card {
      display: grid;
      gap: 0.45rem;
    }
    .metric-value {
      font-family: var(--display-font);
      font-size: clamp(2rem, 3vw, 2.8rem);
      line-height: 1;
      margin: 0;
    }
    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.65rem;
      margin-top: 0.9rem;
    }
    .pill {
      border: 1px solid var(--line-strong);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.75);
      padding: 0.45rem 0.8rem;
      font-size: 0.95rem;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
    }
    th, td {
      text-align: left;
      vertical-align: top;
      padding: 0.6rem 0.35rem;
      border-top: 1px solid rgba(201, 178, 152, 0.55);
    }
    th {
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    tr:first-child th,
    tr:first-child td {
      border-top: 0;
    }
    .stack {
      display: grid;
      gap: 0.85rem;
    }
    .split-hero {
      display: grid;
      gap: 1rem;
      grid-template-columns: minmax(0, 1.6fr) minmax(280px, 1fr);
      align-items: start;
    }
    .hero-note {
      border-left: 3px solid var(--accent-soft);
      padding-left: 1rem;
    }
    .provider-panel {
      background: rgba(255, 255, 255, 0.5);
      border: 1px dashed var(--line-strong);
      border-radius: 18px;
      padding: 1rem;
    }
    @media (max-width: 760px) {
      header, main {
        padding-left: 1rem;
        padding-right: 1rem;
      }
      .split-hero {
        grid-template-columns: 1fr;
      }
      .dashboard-grid {
        grid-template-columns: 1fr;
      }
      .nav-actions {
        justify-content: flex-start;
      }
      .dashboard-panel-head {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <div class="eyebrow">Library Ops</div>
      <h1 style="margin: 0.25rem 0 0;">{% block page_title %}Library Ops{% endblock %}</h1>
    </div>
    <nav class="nav-actions" aria-label="Primary">
      <a href="{% url 'home' %}">Home</a>
      {% if user.is_authenticated %}
        <a href="{% url 'loan-dashboard' %}">Loans</a>
      {% endif %}
      <a href="{% url 'catalog-index' %}">Catalog</a>
      {% if can_manage_catalog %}
        <a class="button" href="{% url 'catalog-create' %}">Create foundation record</a>
      {% endif %}
      {% if user.is_authenticated %}
        <a href="{% url 'account_logout' %}">Sign out</a>
      {% else %}
        <a class="button button--ghost" href="{% url 'account_login' %}">Sign in</a>
      {% endif %}
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
