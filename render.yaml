services:
  - type: web
    name: library-ops
    runtime: python
    plan: free
    buildCommand: uv sync --frozen --no-dev && uv run python manage.py collectstatic --noinput
    preDeployCommand: uv run python manage.py migrate --noinput
    startCommand: uv run gunicorn libraryops.config.wsgi:application
    healthCheckPath: /health/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: libraryops.config.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        sync: false
      - key: DATABASE_URL
        sync: false
