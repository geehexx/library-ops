version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    target-branch: "development"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    labels: ["dependencies", "python"]
    commit-message:
      prefix: "deps"
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "development"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    labels: ["dependencies", "node"]
    commit-message:
      prefix: "deps"
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "development"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    labels: ["dependencies", "github-actions"]
    commit-message:
      prefix: "deps"
