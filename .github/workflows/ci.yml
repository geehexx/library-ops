name: ci

on:
  pull_request:
    branches: [development, main]
  push:
    branches: [development, main]

permissions:
  contents: read

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: libraryops
          POSTGRES_PASSWORD: libraryops
          POSTGRES_DB: libraryops_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Set up Python
        run: uv python install 3.12

      - name: Install Python dependencies
        run: uv sync --all-groups

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install Node governance dependencies
        run: npm ci

      - name: Install Playwright browser
        run: uv run playwright install --with-deps chromium

      - name: Run runtime quality checks
        run: npm run checks:quality

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: playwright-artifacts
          path: output/playwright/**
          if-no-files-found: ignore

  docs-bootstrap:
    name: docs-bootstrap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Set up Python
        run: uv python install 3.12

      - name: Install Python dependencies
        run: uv sync --all-groups

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install Node governance dependencies
        run: npm ci

      - name: Set up Go for Vale
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25'

      - name: Install Vale
        run: go install github.com/errata-ai/vale/v3/cmd/vale@latest

      - name: Install Lychee
        run: cargo install lychee --version 0.23.0 --locked

      - name: Run docs/bootstrap checks
        run: npm run checks:ci:docs

  workflow-security:
    name: workflow-security
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Go for actionlint
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25'

      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@latest

      - name: Run actionlint
        run: actionlint

      - name: Run zizmor
        run: pipx run zizmor .

  security:
    name: security
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run Gitleaks
        run: |
          tmpdir="$(mktemp -d)"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz" -o "$tmpdir/gitleaks.tar.gz"
          tar -xzf "$tmpdir/gitleaks.tar.gz" -C "$tmpdir"
          "$tmpdir/gitleaks" detect --source . --redact

      - name: Run Semgrep
        run: pipx run semgrep scan --config .semgrep.yml

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Run Bandit
        run: uvx --from bandit bandit -c pyproject.toml -r src

  policy:
    name: policy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Go for Conftest
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25'

      - name: Install Conftest
        run: go install github.com/open-policy-agent/conftest@latest

      - name: Validate Codex policy inputs
        run: conftest test .codex/config.toml --policy policy --namespace library_ops.codex

      - name: Validate workflow policy inputs
        run: conftest test .github/workflows/*.yml --policy policy --namespace library_ops.github_actions
