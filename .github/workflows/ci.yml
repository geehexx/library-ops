name: ci

on:
  pull_request:
    branches: [development, main]
  push:
    branches: [development, main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  temporary-ci-disabled:
    name: temporary-ci-disabled
    runs-on: ubuntu-latest
    steps:
      - name: Explain temporary posture
        run: |
          echo "Temporary CI stub: heavy GitHub quality/security/docs gates are disabled."
          echo "Local hooks and local verification remain the active guardrails."
          echo "Restore the full CI workflow before the final release/main pass."
