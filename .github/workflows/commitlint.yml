name: commitlint

on:
  pull_request:
    branches: [development, main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  temporary-commitlint-disabled:
    name: temporary-commitlint-disabled
    runs-on: ubuntu-latest
    steps:
      - name: Explain temporary posture
        run: |
          echo "Temporary commitlint stub: PR-side GitHub commitlint is disabled."
          echo "Local commit-msg hooks remain the active guardrail."
          echo "Restore the full workflow before the final release/main pass."
